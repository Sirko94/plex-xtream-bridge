version: "3.9"

services:
  xtream-bridge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xtream-bridge
    restart: unless-stopped

    ports:
      - "7070:8080"

    volumes:
      - ./config:/config  # config sauvegardée par l'interface web + logs
      - ./output:/output  # fichiers .strm/.nfo pour Plex

    dns:
      - 9.9.9.9
      - 149.112.112.112

    environment:
      # Remplace l'IP par celle de ton serveur
      XTREAM__Bridge__PublicBaseUrl: "http://192.168.1.16:7070"
      TZ: "Europe/Paris"

    # Les credentials Xtream se configurent via l'interface web : http://IP:7070
